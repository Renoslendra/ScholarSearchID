<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Profil — ScholarSearch</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/profile.css">
</head>
<body class="light">
  <nav class="navbar">
    <a href="/" class="navbar-logo">ScholarSearch</a>
    <ul class="navbar-nav">
      <li><a href="/search">Search</a></li>
      <li><a href="/citation">Answer</a></li>
      <li><a href="/library">Library</a></li>
      <li><a href="/lab">Lab</a></li>
    </ul>
    <div class="navbar-right">
      <div class="user-menu" id="user-menu">
        <button class="user-menu-trigger" id="user-menu-trigger">
          <div class="user-avatar">N</div>
          <span class="user-name">NAMA USER</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="user-dropdown" id="user-dropdown">
          <a href="/profile" class="dropdown-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Profil Saya
          </a>
          <a href="/profile/edit" class="dropdown-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit Profil
          </a>
          <a href="/library" class="dropdown-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            Library
          </a>
          <div class="dropdown-divider"></div>
          <a href="/signin" class="dropdown-item dropdown-item--danger">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Keluar
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="edit-profile-container">
    <!-- Sidebar -->
    <aside class="edit-sidebar">
      <h3 class="sidebar-title">Account Management</h3>

      <div class="sidebar-avatar">
        <div class="profile-avatar-xl">N</div>
      </div>

      <button class="btn-upload" id="btn-upload-photo">Upload Profil</button>

      <!-- Change Password toggle -->
      <button class="btn-change-pw" id="btn-toggle-password">Change Password</button>

      <!-- Change Password form (hidden by default) -->
      <div class="pw-form" id="pw-form" style="display:none;">
        <div class="pw-field">
          <label for="old-password">Old Password</label>
          <input type="password" id="old-password" class="pw-input" placeholder="••••••••">
        </div>
        <div class="pw-field">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" class="pw-input" placeholder="••••••••">
        </div>
        <button class="btn-save-pw" id="btn-save-pw">Change Password</button>
      </div>
    </aside>

    <!-- Edit form -->
    <section class="edit-form-section">
      <h2 class="edit-form-title">Edit Profil Information</h2>

      <form class="edit-form" id="edit-profile-form">
        
        <div class="form-grid">
          <div class="form-field">
            <label for="edit-firstname">First Name</label>
            <input type="text" id="edit-firstname" class="form-input" placeholder="First Name">
          </div>
          <div class="form-field">
            <label for="edit-lastname">Last Name</label>
            <input type="text" id="edit-lastname" class="form-input" placeholder="Last Name">
          </div>
          <div class="form-field">
            <label for="edit-username">Username</label>
            <input type="text" id="edit-username" class="form-input" placeholder="Username">
          </div>
          
          <div class="form-field">
            <label for="edit-gender">Gender</label>
            <select id="edit-gender" class="form-input form-select">
              <option value="" disabled selected>Pilih Gender...</option>
              <option value="Laki-laki">Laki-laki</option>
              <option value="Perempuan">Perempuan</option>
            </select>
          </div>
          
          <div class="form-field">
            <label for="edit-country">Country</label>
            <input type="text" id="edit-country" class="form-input" placeholder="Country">
          </div>
          
          <div class="form-field">
            <label for="edit-role">Role</label>
            <select id="edit-role" class="form-input form-select">
              <option value="" disabled selected>Pilih Role...</option>
              <option value="Student">Student (Mahasiswa)</option>
              <option value="Lecturer">Lecturer (Dosen)</option>
              <option value="Researcher">Researcher (Peneliti)</option>
              <option value="Public">Public (Umum)</option>
            </select>
          </div>
        </div> 
        <div class="form-field form-field--full">
          <label for="edit-about">About Me</label>
          <textarea id="edit-about" class="form-textarea" placeholder="Tell us about yourself..." rows="6"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save-profile" id="btn-save-profile">Save Changes</button>
        </div>
      </form>
    </section>
    </main>

  <script src="/static/js/app.js"></script>
  <script src="/static/js/profile.js"></script>
</body>
</html>
