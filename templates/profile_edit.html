<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Profil — ScholarSearch</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/profile.css">
  <link rel="icon" type="image/png" href="/static/img/logoscholarsearch.png">
</head>

<body class="light">
  <nav class="navbar">
    <a href="/" class="navbar-logo" style="display:flex;align-items:center;gap:8px;"><img
        src="/static/img/logoscholarsearch.png" alt="Logo"
        style="height:24px;width:24px;border-radius:6px;box-shadow:0 0 10px rgba(139,92,246,0.3);"> ScholarSearch</a>
    <ul class="navbar-nav">
      <li><a href="/search" data-i18n="nav.search">Search</a></li>
      <li><a href="/citation" data-i18n="nav.answer">Answer</a></li>
      <li><a href="/library" data-i18n="nav.library">Library</a></li>
      <li><a href="/lab" data-i18n="nav.lab">Lab</a></li>
    </ul>
    <div class="navbar-right">
      <div class="user-menu" id="user-menu">
        <button class="user-menu-trigger" id="user-menu-trigger" aria-haspopup="true" aria-expanded="false" aria-controls="user-dropdown">
          {% if user.profile_photo %}
          <div class="user-avatar"
            style="background-image:url('{{ user.profile_photo }}');background-size:cover;background-position:center;color:transparent;">
            {{ user.firstname[0].upper() }}</div>
          {% else %}
          <div class="user-avatar">{{ user.firstname[0].upper() }}</div>
          {% endif %}
          <span class="user-name">{{ user.firstname }} {{ user.lastname }}</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </button>
        <div class="user-dropdown" id="user-dropdown">
          <a href="/profile" class="dropdown-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Profil Saya
          </a>
          <a href="/profile/edit" class="dropdown-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            Edit Profil
          </a>
          <a href="/library" class="dropdown-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
            </svg>
            Library
          </a>
          <div class="dropdown-divider"></div>
          <a href="/api/logout" class="dropdown-item dropdown-item--danger">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Keluar
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="edit-profile-container">
    <!-- Sidebar -->
    <aside class="edit-sidebar">
      <h3 class="sidebar-title">Account Management</h3>

      <div class="sidebar-avatar">
        {% if user.profile_photo %}
        <div class="profile-avatar-xl"
          style="background-image:url('{{ user.profile_photo }}');background-size:cover;background-position:center;color:transparent;">
          {{ user.firstname[0].upper() }}</div>
        {% else %}
        <div class="profile-avatar-xl">{{ user.firstname[0].upper() }}</div>
        {% endif %}
      </div>

      <button class="btn-upload" id="btn-upload-photo">Upload Profil</button>
      {% if user.profile_photo %}
      <button class="btn-danger" id="btn-delete-photo">Hapus Foto Profil</button>
      {% endif %}

      <!-- Change Password toggle -->
      <button class="btn-change-pw" id="btn-toggle-password">Change Password</button>

      <!-- Change Password form (hidden by default) -->
      <div class="pw-form" id="pw-form" style="display:none;">
        <div class="pw-field">
          <label for="old-password">Old Password</label>
          <input type="password" id="old-password" class="pw-input" placeholder="••••••••">
        </div>
        <div class="pw-field">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" class="pw-input" placeholder="••••••••">
        </div>
        <button class="btn-save-pw" id="btn-save-pw">Change Password</button>
      </div>
    </aside>

    <!-- Edit form -->
    <section class="edit-form-section">
      <h2 class="edit-form-title">Edit Profil Information</h2>

      <form class="edit-form" id="edit-profile-form">

        <div class="form-grid">
          <div class="form-field">
            <label for="edit-firstname">First Name</label>
            <input type="text" id="edit-firstname" class="form-input" value="{{ user.firstname }}">
          </div>
          <div class="form-field">
            <label for="edit-lastname">Last Name</label>
            <input type="text" id="edit-lastname" class="form-input" value="{{ user.lastname }}">
          </div>
          <div class="form-field">
            <label for="edit-username">Email</label>
            <input type="text" id="edit-email" class="form-input" value="{{ user.email }}" readonly
              style="background:#f3f4f6; color:#9ca3af; cursor:not-allowed;">
          </div>

          <div class="form-field">
            <label for="edit-gender">Gender</label>
            <select id="edit-gender" class="form-input form-select">
              <option value="Laki-laki" {% if user.gender=='Laki-laki' %}selected{% endif %}>Laki-laki</option>
              <option value="Perempuan" {% if user.gender=='Perempuan' %}selected{% endif %}>Perempuan</option>
            </select>
          </div>

          <div class="form-field">
            <label for="edit-country">Country</label>
            <input type="text" id="edit-country" class="form-input" value="{{ user.country }}">
          </div>

          <div class="form-field">
            <label for="edit-role">Role</label>
            <select id="edit-role" class="form-input form-select">
              <option value="" disabled {% if not user.role %}selected{% endif %}>Pilih Role...</option>
              <option value="Student" {% if user.role=='Student' %}selected{% endif %}>Student (Mahasiswa)</option>
              <option value="Lecturer" {% if user.role=='Lecturer' %}selected{% endif %}>Lecturer (Dosen)</option>
              <option value="Researcher" {% if user.role=='Researcher' %}selected{% endif %}>Researcher (Peneliti)
              </option>
              <option value="Public" {% if user.role=='Public' %}selected{% endif %}>Public (Umum)</option>
            </select>
          </div>
        </div>
        <div class="form-field form-field--full">
          <label for="edit-about">About Me</label>
          <textarea id="edit-about" class="form-textarea" placeholder="Tell us about yourself..."
            rows="6">{{ user.about }}</textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save-profile" id="btn-save-profile">Save Changes</button>
        </div>
      </form>
    </section>
  </main>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/app.js"></script>
  <script src="/static/js/profile.js?v=3"></script>
  <script>
    const editForm = document.getElementById('edit-profile-form');
    if (editForm) {
      editForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-save-profile');

        const firstname = document.getElementById('edit-firstname').value;
        const lastname = document.getElementById('edit-lastname').value;
        const gender = document.getElementById('edit-gender').value;
        const country = document.getElementById('edit-country').value;
        const role = document.getElementById('edit-role').value;
        const about = document.getElementById('edit-about').value;

        const originalText = btn.textContent;
        btn.textContent = 'Saving...';
        btn.style.opacity = '0.8';
        btn.disabled = true;

        try {
          const res = await fetch('/api/profile/edit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ firstname, lastname, gender, country, role, about })
          });

          if (res.ok) {
            btn.textContent = 'Saved!';
            btn.style.background = '#22c55e';
            setTimeout(() => {
              window.location.href = '/profile';
            }, 800);
          } else {
            const data = await res.json();
            alert(data.error || 'Failed to save changes');
            btn.textContent = originalText;
            btn.style.opacity = '1';
            btn.style.background = '';
            btn.disabled = false;
          }
        } catch (err) {
          alert('Terjadi kesalahan jaringan.');
          btn.textContent = originalText;
          btn.style.opacity = '1';
          btn.style.background = '';
          btn.disabled = false;
        }
      });
    }

    const btnDeletePhoto = document.getElementById('btn-delete-photo');
    if (btnDeletePhoto) {
      btnDeletePhoto.addEventListener('click', async () => {
        if (!confirm('Apakah Anda yakin ingin menghapus foto profil?')) return;
        try {
          const res = await fetch('/api/profile/delete_photo', { method: 'POST' });
          if (res.ok) {
            window.location.reload();
          } else {
            alert('Gagal menghapus foto.');
          }
        } catch (err) {
          alert('Terjadi kesalahan jaringan.');
        }
      });
    }
  </script>
</body>

</html>
