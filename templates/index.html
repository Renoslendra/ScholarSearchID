<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScholarSearch Indonesia — Academic Discovery</title>
  <meta name="description" content="Temukan jawaban dari jutaan paper akademik Indonesia.">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="hero" id="hero">
    <!-- Animated Background Canvas -->
    <canvas id="hero-bg-canvas"></canvas>
    <!-- Gradient Overlay for readability -->
    <div class="hero-gradient-overlay"></div>
    <!-- Mouse-following glow -->
    <div class="hero-mouse-glow" id="hero-mouse-glow"></div>

    <h1 class="hero-title" id="hero-title">
      <span class="shiny-decrypted" id="decrypted-text"></span>
    </h1>
    <p class="hero-subtitle">Temukan Jawaban dari Jutaan Paper Akademik</p>

    <div class="mode-toggle" id="mode-toggle">
      <button class="mode-btn active" data-mode="search" id="btn-search-mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search Mode
      </button>
      <button class="mode-btn" data-mode="answer" id="btn-answer-mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Answer Mode
      </button>
    </div>

    <form class="search-box" id="search-form" action="/search" method="get">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" name="q" id="search-input" placeholder="Ask a question or search for papers..." autocomplete="off">
      <button type="submit" class="search-submit" id="search-submit" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>

    <div class="stats-bar" id="stats-bar">
      <span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        1000 Papers
      </span>
      <span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Indonesian Univs
      </span>
      <span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 21V14"/><path d="M4 10V3"/><path d="M12 21V12"/><path d="M12 8V3"/><path d="M20 21V16"/><path d="M20 12V3"/></svg>
        ID/EN Native
      </span>
    </div>
  </main>

  <script src="/static/js/app.js"></script>
  <script src="/static/js/search.js"></script>
  <script src="/static/js/hero-animation.js"></script>
</body>
</html>
