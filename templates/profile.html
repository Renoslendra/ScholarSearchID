<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile — ScholarSearch</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/profile.css">
  </head>
  <body class="light">
    <nav class="navbar">
      <a href="/" class="navbar-logo">ScholarSearch</a>
      <ul class="navbar-nav">
        <li><a href="/search">Search</a></li>
        <li><a href="/citation">Answer</a></li>
        <li><a href="/library">Library</a></li>
        <li><a href="/lab">Lab</a></li>
      </ul>
      <div class="navbar-right">
        <!-- Logged-in user avatar + dropdown -->
        <div class="user-menu" id="user-menu">
          <button class="user-menu-trigger" id="user-menu-trigger">
            <div class="user-avatar">N</div>
            <span class="user-name">NAMA USER</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2"><polyline
                points="6 9 12 15 18 9" /></svg>
          </button>
          <div class="user-dropdown" id="user-dropdown">
            <a href="/profile" class="dropdown-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"><path
                  d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle
                  cx="12" cy="7" r="4" /></svg>
              Profil Saya
            </a>
            <a href="/profile/edit" class="dropdown-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"><path
                  d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path
                  d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>
              Edit Profil
            </a>
            <a href="/library" class="dropdown-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"><path
                  d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" /></svg>
              Library
            </a>
            <div class="dropdown-divider"></div>
            <a href="/signin" class="dropdown-item dropdown-item--danger">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"><path
                  d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline
                  points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9"
                  y2="12" /></svg>
              Keluar
            </a>
          </div>
        </div>
      </div>
    </nav>

    <main class="profile-container">
      <div class="profile-card-wrapper">

        <div class="profile-banner"></div>

        <div class="profile-header">
          <div class="profile-header-left">
            <div class="profile-avatar-lg">N</div>
            <div class="profile-info">
              <h2 class="profile-name" id="profile-name">ZVRNC</h2>
              <p class="profile-email"
                id="profile-email">akunuser@example.com</p>
            </div>
          </div>

          <a href="/profile/edit" class="btn-edit" id="btn-edit-profile">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round"><path
                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path
                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>
            Edit Profil
          </a>
        </div>

        <div class="profile-details-clean">
          <div class="profile-grid">
            <div class="profile-field">
              <label>First Name</label>
              <div class="profile-value" id="pf-firstname">ZVRNC</div>
            </div>
            <div class="profile-field">
              <label>Last Name</label>
              <div class="profile-value" id="pf-lastname">GG</div>
            </div>
            <div class="profile-field">
              <label>Username</label>
              <div class="profile-value" id="pf-username">Zvrnce</div>
            </div>
            <div class="profile-field">
              <label>Gender</label>
              <div class="profile-value" id="pf-gender">Laki-Laki</div>
            </div>
            <div class="profile-field">
              <label>Country</label>
              <div class="profile-value" id="pf-country">Indonesia</div>
            </div>
            <div class="profile-field">
              <label>Role</label>
              <div class="profile-value" id="pf-role">Student</div>
            </div>
          </div>
          <div class="profile-field profile-field--full">
            <label>About Me</label>
            <div class="profile-value profile-value--bio" id="pf-about">Lorem
              Ipsum description user</div>
          </div>
        </div>

      </div>
    </main>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/profile.js"></script>
  </body>
</html>
