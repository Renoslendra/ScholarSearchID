<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buat Akun — ScholarSearch</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body.light {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== SPLIT LAYOUT ===== */
    .auth-layout {
      flex: 1;
      display: flex;
      min-height: calc(100vh - 60px);
    }

    /* Left side — image showcase */
    .auth-showcase {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      min-height: 500px;
    }

    .showcase-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .showcase-slide.active {
      opacity: 1;
    }

    .showcase-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.4) 40%,
          rgba(0, 0, 0, 0.15) 100%);
      z-index: 1;
    }

    .showcase-content {
      position: relative;
      z-index: 2;
      padding: 48px 40px;
      color: #fff;
      max-width: 500px;
    }

    .showcase-content h2 {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .showcase-content p {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.6;
    }

    /* Feature pills */
    .showcase-features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .showcase-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .showcase-pill svg {
      width: 14px;
      height: 14px;
    }

    .showcase-dots {
      position: absolute;
      bottom: 24px;
      right: 40px;
      z-index: 3;
      display: flex;
      gap: 8px;
    }

    .showcase-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .showcase-dot.active {
      background: #fff;
      width: 24px;
      border-radius: 4px;
    }

    /* Right side — form */
    .auth-form-side {
      width: 500px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 40px;
      background: var(--bg-surface);
      overflow-y: auto;
    }

    .auth-form-inner {
      width: 100%;
      max-width: 380px;
    }

    .auth-logo {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
      text-align: center;
    }

    .auth-logo span {
      color: var(--accent);
    }

    .auth-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
      text-align: center;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-sec);
      margin-bottom: 24px;
      text-align: center;
    }

    .auth-field {
      margin-bottom: 14px;
    }

    .auth-field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 5px;
    }

    .auth-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .auth-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .auth-input::placeholder {
      color: var(--text-muted);
    }

    .name-row {
      display: flex;
      gap: 12px;
    }

    .name-row .auth-field {
      flex: 1;
    }

    .btn-auth-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      margin-top: 4px;
    }

    .btn-auth-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-divider span {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .auth-footer-text {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: var(--text-sec);
    }

    .auth-footer-text a {
      color: var(--accent);
      font-weight: 600;
    }

    .auth-footer-text a:hover {
      text-decoration: underline;
    }

    .auth-terms {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 14px;
      line-height: 1.5;
    }

    .auth-terms a {
      color: var(--accent);
      font-weight: 500;
    }

    /* Footer */
    .auth-page-footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
    }

    .auth-page-footer a {
      color: var(--text-muted);
      margin-left: 16px;
      transition: color 0.2s;
    }

    .auth-page-footer a:hover {
      color: var(--text);
    }

    @media (max-width: 900px) {
      .auth-showcase {
        display: none;
      }

      .auth-form-side {
        width: 100%;
        padding: 32px 24px;
      }
    }
  </style>
  <link rel="icon" type="image/png" href="/static/img/logoscholarsearch.png">
</head>

<body class="light">

  <div class="auth-layout">
    <!-- Left: Image Showcase -->
    <div class="auth-showcase" id="auth-showcase">
      <div class="showcase-slide active" style="background-image:url('/static/img/campus2.jpg')"></div>
      <div class="showcase-slide" style="background-image:url('/static/img/campus3.jpg')"></div>
      <div class="showcase-slide" style="background-image:url('/static/img/campus1.jpg')"></div>

      <div class="showcase-overlay"></div>

      <div class="showcase-content">
        <h2>Bergabung dengan Komunitas Riset Indonesia</h2>
        <p>Akses pencarian paper akademik presisi tinggi dan temukan referensi jurnal terbaik untuk penelitian Anda.</p>
      </div>

      <div class="showcase-dots" id="showcase-dots">
        <button class="showcase-dot active" data-idx="0"></button>
        <button class="showcase-dot" data-idx="1"></button>
        <button class="showcase-dot" data-idx="2"></button>
      </div>
    </div>

    <!-- Right: Register Form -->
    <div class="auth-form-side">
      <div class="auth-form-inner">
        <h1 class="auth-title">Buat Akun Baru</h1>
        <div class="auth-logo">Scholar<span>Search</span></div>
        <p class="auth-subtitle">Mulai jelajahi jutaan paper akademik Indonesia.</p>
        <div class="name-row">
          <div class="auth-field">
            <label for="reg-firstname">Nama Depan</label>
            <input type="text" class="auth-input" id="reg-firstname" placeholder="Nama Depan">
          </div>
          <div class="auth-field">
            <label for="reg-lastname">Nama Belakang</label>
            <input type="text" class="auth-input" id="reg-lastname" placeholder="Nama Belakang">
          </div>
        </div>

        <div class="auth-field">
          <label for="reg-email">Email</label>
          <input type="email" class="auth-input" id="reg-email" placeholder="nama@email.com">
        </div>
        <div class="auth-field">
          <label for="reg-password">Kata Sandi</label>
          <div class="password-wrapper">
            <input type="password" class="auth-input" id="reg-password" placeholder="Minimal 8 karakter">
            <button type="button" class="btn-toggle-password" aria-label="Lihat kata sandi">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                </path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>
        <div class="auth-field">
          <label for="reg-confirm">Konfirmasi Kata Sandi</label>
          <div class="password-wrapper">
            <input type="password" class="auth-input" id="reg-confirm" placeholder="Ulangi kata sandi">
            <button type="button" class="btn-toggle-password" aria-label="Lihat kata sandi">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                </path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>
        <button class="btn-auth-primary" id="btn-register">Buat Akun</button>

        <p class="auth-footer-text">Sudah punya akun? <a href="/signin">Masuk di sini</a></p>
      </div>
    </div>
  </div>

  <script>
    // Real Registration Request
    document.getElementById('btn-register').addEventListener('click', async function (e) {
      e.preventDefault();
      const first = document.getElementById('reg-firstname').value;
      const last = document.getElementById('reg-lastname').value;
      const email = document.getElementById('reg-email').value;
      const pass = document.getElementById('reg-password').value;
      const conf = document.getElementById('reg-confirm').value;

      if (!first || !last || !email || !pass || !conf) {
        alert('Mohon isi semua form registrasi.');
        return;
      }

      if (pass !== conf) {
        alert('Kata sandi dan konfirmasi kata sandi tidak cocok!');
        return;
      }

      const originalText = this.textContent;
      this.textContent = 'Membuat Akun...';
      this.style.opacity = '0.8';
      this.disabled = true;

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            firstname: first,
            lastname: last,
            email: email,
            password: pass
          })
        });

        const data = await response.json();
        if (response.ok) {
          window.location.href = '/profile';
        } else {
          alert(data.error || 'Gagal membuat akun.');
          this.textContent = originalText;
          this.style.opacity = '1';
          this.disabled = false;
        }
      } catch (err) {
        alert('Terjadi kesalahan jaringan.');
        this.textContent = originalText;
        this.style.opacity = '1';
        this.disabled = false;
      }
    });
    // Image slideshow
    (function () {
      const slides = document.querySelectorAll('.showcase-slide');
      const dots = document.querySelectorAll('.showcase-dot');
      let current = 0;
      const total = slides.length;

      function goTo(idx) {
        slides[current].classList.remove('active');
        dots[current].classList.remove('active');
        current = idx;
        slides[current].classList.add('active');
        dots[current].classList.add('active');
      }

      setInterval(() => goTo((current + 1) % total), 5000);

      dots.forEach(dot => {
        dot.addEventListener('click', () => goTo(parseInt(dot.dataset.idx)));
      });
    })();
    // Fitur Show/Hide Password
    const togglePasswordBtns = document.querySelectorAll('.btn-toggle-password');

    togglePasswordBtns.forEach(btn => {
      btn.addEventListener('click', function () {
        // Cari input yang posisinya persis di sebelah tombol ini
        const input = this.previousElementSibling;
        const icon = this.querySelector('.eye-icon');

        if (input.type === 'password') {
          input.type = 'text'; // Ubah jadi teks biasa agar terlihat
          // Ganti icon ke Eye Open
          icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        } else {
          input.type = 'password'; // Kembalikan jadi titik-titik
          // Ganti icon ke Eye Off (dicoret)
          icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        }
      });
    });
  </script>
  <script src="/static/js/i18n.js"></script>
</body>

</html>
